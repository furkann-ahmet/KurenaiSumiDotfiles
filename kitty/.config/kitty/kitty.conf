# ════════════════════════════════════════════════════════════
#  KURENAI SUMI — kitty
#  ink black zemin · rice paper metin · crimson cursor · bronz seçim
#  (Alacritty ayarlarından taşındı: font/opacity/padding/keybind)
# ════════════════════════════════════════════════════════════

# ── Font ──
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Pencere ──
background_opacity     0.8
window_padding_width   8
initial_window_width   100c
initial_window_height  30c
remember_window_size   no
confirm_os_window_close 0
hide_window_decorations no

# ── Davranış ──
scrollback_lines    10000
copy_on_select      clipboard
strip_trailing_spaces smart
mouse_hide_wait     1.0
enable_audio_bell   no

# ── Cursor ──
cursor_shape          underline
cursor_blink_interval 0

# ── Kurenai Sumi renkleri ──
foreground           #F6EDE2
background           #0F0F0F
selection_foreground #0F0F0F
selection_background #C9A34D
cursor               #B71C1C
cursor_text_color    #0F0F0F
url_color            #C9A34D

# normal
color0  #2A2A2A
color1  #B71C1C
color2  #6E8B5E
color3  #C9A34D
color4  #5B7E99
color5  #8C5F73
color6  #5E8C89
color7  #D9CFC3
# bright
color8  #4A4A4A
color9  #CF3A3A
color10 #86A574
color11 #E0BE6A
color12 #7498B3
color13 #A87890
color14 #78A6A3
color15 #F6EDE2

# ── Sekme çubuğu (Kurenai Sumi) ──
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #0F0F0F
active_tab_background   #B71C1C
active_tab_font_style   bold
inactive_tab_foreground #9E9388
inactive_tab_background #1A1A1A

# ── Keybind'ler (Alacritty paritesi) ──
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+0       change_font_size all 0
# sekme/split (kitty bonus)
map ctrl+shift+t new_tab
map ctrl+shift+enter new_window
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
