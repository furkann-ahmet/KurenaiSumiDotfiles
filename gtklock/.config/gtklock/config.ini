# ════════════════════════════════════════════════════════════
#  KURENAI SUMI — gtklock yapılandırması
#  gtklock bunu otomatik okur: ~/.config/gtklock/config.ini  ([main] grubu)
#  Render ON-DEMAND (hyprlock'un sürekli ~59fps render'ı YOK) → NVIDIA takılması yok.
# ════════════════════════════════════════════════════════════
[main]
style=$HOME/.config/gtklock/style.css
# koyu + branded (紅墨 / KURENAI SUMI gömülü) arka plan
background=$HOME/.config/hypr/lock-bg-swaylock.png
time-format=%H:%M
date-format=%A, %d %B
# avatar (userinfo) + power sırası (powerbar)
modules=/usr/lib/gtklock/userinfo-module.so;/usr/lib/gtklock/powerbar-module.so
# lock formu HER ZAMAN ana monitörde (DP-3) açılsın — odak takip etme
follow-focus=false
monitor-priority=DP-3
idle-hide=false

[powerbar]
poweroff-command=systemctl poweroff
reboot-command=systemctl reboot
suspend-command=systemctl suspend
# userswitch/logout verilmedi → o butonlar gizli

[userinfo]
# yuvarlak avatar (no-round-image verilmedi)
