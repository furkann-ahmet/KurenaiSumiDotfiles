# =========================
# Minimal Hyprland config
# =========================

# Mod key
$mainMod = SUPER

# Programs
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun

# Monitor — açık düzen monitors.conf'ta (nwg-displays bunu yönetir)
source = ~/.config/hypr/monitors.conf
# Yeni/bilinmeyen monitörler için yedek
monitor = , preferred, auto, 1

# Workspace'leri monitörlere sabitle (DP-3:1-4 | DP-1:5-7 | DP-2:8-10)
source = ~/.config/hypr/workspaces.conf

# Tema renkleri (matugen üretir — wallpaper'dan + sabit kırmızı aksan)
source = ~/.config/hypr/colors.conf

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_MENU_PREFIX,plasma-
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,kde
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# ─── NVIDIA Wayland (RTX 4070 tüm monitörleri sürüyor — bu env'ler EKSİKTİ) ───
# Eksikliği frame-pacing/present sorunlarına yol açıyordu: hyprlock damage yerine
# her vblank render ediyor (157fps×3), session-lock present'i takılıyordu.
# Sürücü 610 explicit-sync destekli → NVD_BACKEND=direct uygun.
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = NVD_BACKEND,direct
env = __GL_GSYNC_ALLOWED,0
env = __GL_VRR_ALLOWED,0

# Cursor (ortadaki hayalet imleci önler)
env = XCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,24

# DP-3'te hayalet imleç sorununu donanım imleci çözdü (yazılım imleci o monitörde
# eski sprite'ı temizlemiyordu). Bu ayarlar canlı test edilip doğrulandı.
cursor {
    no_hardware_cursors = false
    use_cpu_buffer = false
}

# Autostart
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user reset-failed
# xdg-desktop-portal (dosya seçme pencereleri, ekran paylaşımı) — systemd zinciri kırık, elle başlat
exec-once = /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal -r &
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = hyprctl setcursor breeze_cursors 24
exec-once = hyprpaper
exec-once = ~/.config/ags/start.sh   # AGS bar (waybar'ın yerine)
exec-once = swaync
# media-watch.sh kaldırıldı — AGS media native (mpris servisi)
# nm-applet kaldırıldı — ağ durumu waybar'da zaten var (gereksiz tray ikonu)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Masaüstü deneyimi servisleri (kurulunca devreye girer)
exec-once = hypridle
exec-once = swayosd-server
# hyprlock'u hızlı/tutarlı aç: Inter fontu + lock varlıklarını page-cache'e ısıt
exec-once = sleep 8 && cat /usr/share/fonts/inter/Inter.ttc ~/.config/hypr/lock-bg.png ~/.config/hypr/kurenai-kanji.png > /dev/null 2>&1
exec-once = udiskie --no-tray
# blueman-applet kaldırıldı — bluetooth durumu waybar modülünde (okunaklı themed glyph)
exec-once = gnome-keyring-daemon --start --components=secrets,ssh,pkcs11

# Input
input {
    kb_layout = tr
    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }

    sensitivity = 0
}

# General look
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $accent
    col.inactive_border = $line
    layout = dwindle
}

decoration {
    rounding = 12

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        vibrancy = 0.17
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = $shadow_color
    }
}

animations {
    enabled = true
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Qt/KDE uygulamalarına cam (Hyprland 0.55 sözdizimi: match:class ... , opacity)
windowrule = match:class ^(org.kde.dolphin|org.kde.kate|org.kde.okular|org.kde.spectacle|org.kde.ark|systemsettings)$, opacity 0.85
# gwenview tam opak — şeffaf olunca fotoğrafların gerçek rengi yanıltıcı oluyor
windowrule = match:class ^(org.kde.gwenview)$, opacity 1.0

# Waybar'dan açılan ayar pencereleri "popup gibi": yüzen + sağ üstte (bar altında)
windowrule = match:class ^(pavucontrol)$, float 1
windowrule = match:class ^(pavucontrol)$, size 440 540
windowrule = match:class ^(pavucontrol)$, move 100%-454 14
windowrule = match:class ^(nm-connection-editor)$, float 1
windowrule = match:class ^(nm-connection-editor)$, size 500 580
windowrule = match:class ^(nm-connection-editor)$, move 100%-514 14
windowrule = match:class ^(.blueman-manager-wrapped|blueman-manager)$, float 1
windowrule = match:class ^(.blueman-manager-wrapped|blueman-manager)$, size 480 560
windowrule = match:class ^(.blueman-manager-wrapped|blueman-manager)$, move 100%-494 14

# ===== Kısayollar — KDE/Windows tarzı =====

# Uygulama menüsü (Başlat): Super'e tek başına bas → AGS GRID launcher (appgrid)
bindr = SUPER, Super_L, exec, ags request appgrid
# Alt+Space de aynı GRID launcher'ı açar
bind = ALT, Space, exec, ags request appgrid

# Terminal: Ctrl+Alt+T (klasik) veya Super+Enter
bind = CTRL ALT, T, exec, $terminal
bind = $mainMod, Return, exec, $terminal

# Dosya yöneticisi
bind = $mainMod, E, exec, $fileManager

# Pencere kapat: Alt+F4 (Windows)
bind = ALT, F4, killactive
bind = $mainMod, Q, killactive

# Pencere geçişi: Alt+Tab / Alt+Shift+Tab
bind = ALT, Tab, cyclenext
bind = ALT, Tab, bringactivetotop
bind = ALT SHIFT, Tab, cyclenext, prev
bind = ALT SHIFT, Tab, bringactivetotop

# Tam ekran / maksimize / yüzen pencere
bind = $mainMod, F, fullscreen, 0           # gerçek tam ekran
bind = $mainMod, M, fullscreen, 1           # maksimize (çubuk görünür kalır)
bind = $mainMod SHIFT, Space, togglefloating # yüzen <-> döşeli (Windows gibi serbest)

# FARE ile taşı/boyutlandır (Super basılı tut + sürükle) — hem yüzen hem döşeli pencerede
bindm = $mainMod, mouse:272, movewindow      # Super + sol tık sürükle = taşı
bindm = $mainMod, mouse:273, resizewindow    # Super + sağ tık sürükle = boyutlandır

# KLAVYE ile boyutlandır (Super + Alt + oklar) — basılı tutunca tekrarlar
binde = $mainMod ALT, left, resizeactive, -40 0
binde = $mainMod ALT, right, resizeactive, 40 0
binde = $mainMod ALT, up, resizeactive, 0 -40
binde = $mainMod ALT, down, resizeactive, 0 40

# "Küçültme" yerine: pencereyi gizli çekmeceye (scratchpad) at / geri çağır
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Minimize: aktif pencereyi gizli special:minimized'e at → ags bar'da simge olur,
# tıklayınca geri gelir (geri yükleme bar'dan, klavye/menü gerekmez).
bind = $mainMod, H, movetoworkspacesilent, special:minimized

# Tiling kontrolü
bind = $mainMod, J, layoutmsg, togglesplit   # bölme yönünü çevir (yatay <-> dikey)
bind = $mainMod, P, pseudo                    # pseudo-tile (döşeli ama kendi boyutunu korur)
bind = $mainMod, G, togglegroup          # pencereleri SEKME gibi grupla
bind = $mainMod, Tab, changegroupactive, f   # grup içinde sekmeler arası geç

# Kilit (Super+L) ve güç menüsü (Ctrl+Alt+Del)
bind = $mainMod, L, exec, $HOME/.config/hypr/lock.sh
bind = CTRL ALT, Delete, exec, ags request power

# ─── Kurenai Sumi — AGS paneller (aktif monitörde toggle) ───────
bind = $mainMod, D, exec, ags request dashboard
bind = $mainMod, I, exec, ags request inforail
bind = $mainMod, Space, exec, ags request appgrid
# Ekran kaydı paneli: Super+Shift+R (Super+R resize submap'inde dolu)
bind = $mainMod SHIFT, R, exec, ags request record
# Exposé / genel bakış: Super+A (açık tüm pencereler ızgarası)
bind = $mainMod, A, exec, ags request expose
# Clipboard: Super+V (yukarıda), Launcher (grid): Super_L/Alt+Space/Super+Space (yukarıda)
# Bildirimler: swaync merkezi (Faz 3'te Kurenai Sumi teması verilecek)
bind = $mainMod, N, exec, swaync-client -t -sw

# Pano geçmişi: Win+V → AGS clipboard paneli
bind = $mainMod, V, exec, ags request clipboard

# Oturumu kapat (eski exit — istersen dursun)
bind = $mainMod SHIFT, E, exit

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Masaüstleri arası geçiş (Windows 11: Ctrl+Win+Ok)
bind = CTRL $mainMod, left, workspace, e-1
bind = CTRL $mainMod, right, workspace, e+1

# Son kullanılan workspace'e zıpla (masaüstleri arası Alt+Tab gibi)
bind = $mainMod, grave, workspace, previous

# ===== Monitörler arası (3 ekran: DP-1 sol | DP-3 orta | DP-2 sağ-dikey) =====
# Odağı komşu monitöre taşı  ( , = önceki / . = sonraki, sırayla döner)
bind = $mainMod, comma,  focusmonitor, -1
bind = $mainMod, period, focusmonitor, +1
# Aktif pencereyi komşu monitöre fırlat (odak da takip eder)
bind = $mainMod SHIFT, comma,  movewindow, mon:-1
bind = $mainMod SHIFT, period, movewindow, mon:+1
# Tüm workspace'i komşu monitöre taşı (Ctrl katmanı)
bind = $mainMod CTRL, comma,  movecurrentworkspacetomonitor, -1
bind = $mainMod CTRL, period, movecurrentworkspacetomonitor, +1

# ===== Resize modu (sürekli klavyeyle boyutlandırma) =====
# Super+R ile gir, oklarla boyutlandır, Esc/Enter ile çık — Super basılı tutman gerekmez
bind = $mainMod, R, submap, resize
submap = resize
binde = , left,   resizeactive, -40 0
binde = , right,  resizeactive,  40 0
binde = , up,     resizeactive,  0 -40
binde = , down,   resizeactive,  0  40
bind  = , escape, submap, reset
bind  = , Return, submap, reset
submap = reset

# Ekran görüntüsü
bind = , Print, exec, hyprshot -m region                          # alan seç → kaydet + panoya
bind = SHIFT, Print, exec, $HOME/.config/hypr/screenshot-all.sh  # TÜM monitörler → kaydet + panoya
bind = ALT, Print, exec, hyprshot -m output                       # monitör seç → kaydet + panoya

# Volume keys (swayosd-client: ekranda OSD bar gösterir)
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# Media keys
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
