# =========================
# Workspace -> Monitör sabitleme (Dengeli)
# DP-3 orta/ana (1440p 165Hz) | DP-1 sol (1080p) | DP-2 sağ (1080p dikey)
# default:true = monitör açıldığında baştan gösterilen workspace
# =========================

# --- DP-3 (orta / ana) : 1-4 ---
workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3

# --- DP-1 (sol) : 5-7 ---
workspace = 5, monitor:DP-1, default:true
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1

# --- DP-2 (sağ / dikey) : 8-10 ---
workspace = 8, monitor:DP-2, default:true
workspace = 9, monitor:DP-2
workspace = 10, monitor:DP-2
