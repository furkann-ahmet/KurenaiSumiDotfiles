# Hypridle — boşta kalma yönetimi (masaüstü: uyutma yok, sadece kilit + ekran kapatma)

general {
    lock_cmd = pidof hyprlock || $HOME/.config/hypr/lock.sh   # medyayı duraklat + hyprlock (iki kez kilitlemeyi önler)
    before_sleep_cmd = loginctl lock-session     # uyumadan önce kilitle
    after_sleep_cmd = hyprctl dispatch dpms on   # uyanınca ekranları aç
}

# 5 dk sonra kilitle
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 10 dk sonra ekranları kapat (DPMS)
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
