# ════════════════════════════════════════════════════════════
#  KURENAI SUMI — hyprlock
#  blur'lu wallpaper · ortada dark glass kart · büyük saat · crimson input
#  NOT: Bu dosya artık SABİT (Kurenai Sumi). matugen/retheme ÇALIŞTIRMA →
#  yoksa üzerine yazar. (matugen'in aktif hook'u yok, manuel çalışınca ezer.)
# ════════════════════════════════════════════════════════════

# --- Kurenai Sumi paleti ---
$card        = rgba(0f0f0fd1)
$card_border = rgba(b71c1c5c)
$text        = rgba(f6ede2ff)
$text_dim    = rgba(d9cfc3cc)
$accent      = rgba(b71c1cff)
$accent_brt  = rgba(cf3a3aff)
$bronze      = rgba(c9a34dff)
$shadow      = rgba(0a0a0aaa)

background {
    monitor =
    # ÖNCEDEN pişmiş blur+karart görsel (lock-bg.png). Runtime blur YOK →
    # devasa wallpaper'ı kilit anında blur'lama derdi bitti, anında açılır.
    # Wallpaper değişirse: magick <yeni> -resize 2560x1440^ -gravity center
    #   -extent 2560x1440 -blur 0x10 -modulate 70 ~/.config/hypr/lock-bg.png
    path = $HOME/.config/hypr/lock-bg.png
    blur_passes = 0
}

general {
    hide_cursor = true
}

# Animasyon KAPALI — KANIT: fade-in, idle NVIDIA GPU'da kilit belirir belirmez
# erken ~1-2.6s donmaya yol açıyordu (logda frame ~18-20'de fps 0.38/1.44 stall).
# Fade'in ağır ilk render'ı (3 monitör blend + shader) idle GPU'yu rampa ettiriyordu.
# Animasyon kapalı = ağır ilk render yok = donma yok (oturum 1&2 hızlıydı bu yüzden).
animations {
    enabled = false
}

# --- ortada dark glass login kartı ---
shape {
    monitor =
    size = 460, 420
    color = $card
    rounding = 22
    border_size = 2
    border_color = $card_border
    position = 0, 20
    halign = center
    valign = center
}

# --- büyük saat ---
label {
    monitor =
    text = $TIME
    font_size = 84
    font_family = Inter Medium
    color = $text
    shadow_passes = 2
    shadow_size = 8
    shadow_color = $shadow
    position = 0, 150
    halign = center
    valign = center
}

# --- tarih ---
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 18
    font_family = Inter
    color = $text_dim
    position = 0, 78
    halign = center
    valign = center
}

# --- şifre kutusu (crimson outline) ---
input-field {
    monitor =
    size = 340, 54
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.32
    dots_center = true
    outer_color = $accent
    inner_color = rgba(1a1a1ae6)
    font_color = $text
    fade_on_empty = false
    placeholder_text = <i>Şifre…</i>
    check_color = $bronze
    fail_color = $accent_brt
    fail_text = <i>Yanlış parola ($ATTEMPTS)</i>
    rounding = 14
    position = 0, -20
    halign = center
    valign = center
}

# --- Kurenai Sumi branding ---
# 紅墨 artık ÖNCEDEN ÜRETİLMİŞ GÖRSEL (kurenai-kanji.png) → hyprlock CJK fontunu
# YÜKLEMEZ. Eskiden font label'ıyken Noto CJK soğuk yüklemesi 4-10sn sürüyordu.
label {
    monitor =
    text = KURENAI SUMI
    font_size = 15
    font_family = Inter Medium
    color = $bronze
    position = 0, -118
    halign = center
    valign = center
}

image {
    monitor =
    path = $HOME/.config/hypr/kurenai-kanji.png
    size = 56
    rounding = 0
    border_size = 0
    position = 0, -152
    halign = center
    valign = center
}
