# matugen tarafından üretildi — ELLE DÜZENLEME (her `retheme` üzerine yazar)
# Kaynak: {{image}}
# Taban tonlar wallpaper'dan (inverse — koyu kutu + açık metin, okunur) · sabit kırmızı aksan
# Arka plan: ~/.config/hypr/current-wallpaper symlink'i (retheme tema kaynağına bağlar)

# --- wallpaper'a göre tonlanmış kutu/metin (kontrast garantili) ---
$box       = rgba({{colors.inverse_surface.default.hex_stripped}}d9)
$text      = rgba({{colors.inverse_on_surface.default.hex_stripped}}ff)
$text_dim  = rgba({{colors.inverse_on_surface.default.hex_stripped}}cc)

# --- sabit aksan (kimlik) — hyprland template'iyle aynı ---
$accent        = rgba(a84538ff)
$accent_bright = rgba(ca5746ff)
$shadow_color  = rgba(0e0b0aaa)

background {
    monitor =
    path = $HOME/.config/hypr/current-wallpaper
    blur_passes = 3
    blur_size = 7
    brightness = 0.7
    contrast = 0.9
}

general {
    hide_cursor = true
    grace = 2
    no_fade_in = false
}

# Saat
label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = MesloLGL Nerd Font
    color = $text
    shadow_passes = 2
    shadow_size = 8
    shadow_color = $shadow_color
    position = 0, 220
    halign = center
    valign = center
}

# Tarih
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 22
    font_family = MesloLGL Nerd Font
    color = $text_dim
    shadow_passes = 1
    shadow_size = 4
    shadow_color = $shadow_color
    position = 0, 130
    halign = center
    valign = center
}

# Şifre kutusu
input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.30
    dots_spacing = 0.30
    outer_color = $accent
    inner_color = $box
    font_color = $text
    fade_on_empty = false
    placeholder_text = <i>Şifre…</i>
    check_color = $accent_bright
    fail_color = $accent_bright
    fail_text = <i>Yanlış ($ATTEMPTS deneme)</i>
    position = 0, -40
    halign = center
    valign = center
}
