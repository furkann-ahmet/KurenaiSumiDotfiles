# matugen tarafından üretildi — ELLE DÜZENLEME (her `retheme` üzerine yazar)
# Kaynak: {{image}}   |   SOFT-LIGHT nötr greige · sabit kırmızı aksan (çok hafif)

# --- wallpaper'dan gelen nötr greige taban (kahve cast'i yok) ---
$bg       = rgba({{colors.surface_dim.default.hex_stripped}}ff)
$bg_alt   = rgba({{colors.surface_container_high.default.hex_stripped}}ff)
$bg_high  = rgba({{colors.surface_container_highest.default.hex_stripped}}ff)
$fg       = rgba({{colors.on_surface.default.hex_stripped}}ff)
$fg_dim   = rgba({{colors.on_surface_variant.default.hex_stripped}}ff)
$line     = rgba({{colors.outline_variant.default.hex_stripped}}ff)

# --- sabit aksan (kimlik) — çok az kullanılır ---
$accent        = rgba(a84538ee)
$accent_bright = rgba(ca5746ff)
$accent_dim    = rgba(6e3a32ff)
$shadow_color  = rgba(0e0b0a55)
