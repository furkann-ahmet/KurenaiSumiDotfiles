# matugen tarafından üretildi — ELLE DÜZENLEME
# AÇIK terminal: bg/fg matugen'den; ANSI açık zeminde görünür kalsın diye koyu tonlu.

[colors.primary]
background = "{{colors.surface_dim.default.hex}}"
foreground = "{{colors.on_surface.default.hex}}"
dim_foreground = "{{colors.on_surface_variant.default.hex}}"

[colors.cursor]
text = "{{colors.surface_dim.default.hex}}"
cursor = "#A84538"

[colors.selection]
background = "{{colors.outline_variant.default.hex}}"
text = "{{colors.on_surface.default.hex}}"

[colors.normal]
black   = "#3a3534"
red     = "#A84538"
green   = "#4d6b2f"
yellow  = "#8a5a10"
blue    = "#3a4f8a"
magenta = "#7a3f63"
cyan    = "#2f6b6b"
white   = "#9a938f"

[colors.bright]
black   = "#5a5552"
red     = "#CA5746"
green   = "#5d7b3f"
yellow  = "#a06a18"
blue    = "#4a5f9a"
magenta = "#8a4f73"
cyan    = "#3f7b7b"
white   = "{{colors.on_surface.default.hex}}"
